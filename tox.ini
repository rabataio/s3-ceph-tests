[tox]
envlist = py3

[testenv]
# Install the package once as an editable link instead of rebuilding and
# force-reinstalling an sdist on every run. The default sdist build produced a
# fresh, non-reproducible tarball each run, so pip stored a new ~137KB wheel in
# ~/.cache/pip/wheels every time (the cache has no GC) — 60GB after ~400k runs.
package = editable
# Belt and suspenders: never write to the pip cache from this env.
set_env =
    PIP_NO_CACHE_DIR = 1
deps = -rrequirements.txt
passenv =
  S3TEST_CONF
  S3_USE_SIGV4
  PY_COLORS

commands = pytest -n auto -v {posargs:--deselect-from-file=deselection.txt --durations=5}
